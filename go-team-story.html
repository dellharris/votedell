<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GO Team Story — Dell Harris</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .scale-wrap {
      width: 1080px;
      height: 1920px;
      transform-origin: top center;
      transform: scale(var(--s, 0.4));
      margin: auto;
    }

    /* ── STORY CARD ── */
    .story {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    /* full-bleed hero photo */
    .photo {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 15%;
    }

    /* gradient overlay — heavier at bottom for text legibility */
    .photo::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0,0,0,0.50) 0%,
          rgba(0,0,0,0.18) 22%,
          rgba(0,0,0,0.12) 42%,
          rgba(0,0,0,0.70) 58%,
          rgba(0,0,0,0.93) 72%,
          #111 88%
        );
    }

    /* red glow */
    .glow {
      position: absolute;
      bottom: 480px;
      left: 50%;
      transform: translateX(-50%);
      width: 860px;
      height: 420px;
      background: radial-gradient(ellipse, rgba(200,32,45,0.32) 0%, transparent 70%);
      z-index: 1;
      pointer-events: none;
    }

    /* all content above photo */
    .content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 80px 110px;
    }

    /* top badge */
    .top-badge {
      position: absolute;
      top: 80px;
      left: 80px;
      background: #C8202D;
      color: #fff;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 4px;
    }

    /* "THANK YOU" eyebrow */
    .tag {
      font-size: 38px;
      font-weight: 800;
      color: #C8202D;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* large headline */
    .headline {
      font-size: 112px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 0.92;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .headline span { color: #C8202D; }

    /* sub-headline */
    .sub-headline {
      font-size: 56px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .sub-headline em {
      color: #C8202D;
      font-style: normal;
    }

    /* red divider */
    .divider {
      width: 120px;
      height: 6px;
      background: #C8202D;
      margin-bottom: 44px;
      border-radius: 3px;
    }

    /* body copy */
    .body-text {
      font-size: 40px;
      font-weight: 600;
      color: rgba(255,255,255,0.72);
      line-height: 1.45;
      letter-spacing: 0.01em;
      margin-bottom: 64px;
      max-width: 860px;
    }

    /* school + role line */
    .role-line {
      font-size: 36px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    /* url pill */
    .url-pill {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.22);
      border-radius: 100px;
      padding: 22px 48px;
      width: fit-content;
    }

    .url-pill .dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #C8202D;
      flex-shrink: 0;
    }

    .url-pill span {
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
<script>
  const s = (window.innerHeight * 0.95) / 1920;
  document.documentElement.style.setProperty('--s', s);
  document.body.style.height = (1920 * s + 40) + 'px';
</script>

<div class="scale-wrap" id="card">
  <div class="story">

    <!-- hero photo -->
    <div class="photo">
      <img src="images/family-hero.jpg" alt="Dell Harris with his family" />
    </div>

    <!-- red glow -->
    <div class="glow"></div>

    <!-- top badge -->
    <div class="top-badge">Hope-Hill GO Team 2026</div>

    <!-- main content -->
    <div class="content">
      <div class="tag">Thank you for the support</div>
      <div class="headline">Parent &amp;<br><span>Guardian</span></div>
      <div class="sub-headline">Chair — <em>GO Team</em></div>
      <div class="divider"></div>
      <div class="body-text">
        Honored to serve Hope-Hill Elementary and continue building opportunities for our students, families, and community.
      </div>
      <div class="role-line">Hope-Hill Elementary · Parent Seat</div>
      <div class="url-pill">
        <div class="dot"></div>
        <span>vote.dellharris.com</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
